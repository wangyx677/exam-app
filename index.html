.btn-outline{background:#fff;color:#764ba2;border:2px solid #764ba2}

.btn-danger{background:#e74c3c;color:#fff}
.btn-danger:hover{background:#c0392b}

.btn-orange{background:#e67e22;color:#fff}

.filter-bar label{font-size:14px;color:#666;display:flex;align-items:center;gap:4px;cursor:pointer}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.q-title{font-size:16px;font-weight:700;color:#333;margin-bottom:16px;line-height:1.6}
.q-meta{font-size:12px;color:#999;margin-bottom:12px}
.options{margin:12px 0}

.opt.selected{border-color:#764ba2;background:#f0e8ff;font-weight:600}
.opt.multi-partial{border-color:#e67e22;background:#fef5ec}
.opt.correct{border-color:#27ae60;background:#e8f8ef;color:#27ae60}
.opt.wrong{border-color:#e74c3c;background:#fde8e8;color:#e74c3c}
.opt.answer-reveal{border-color:#2980b9;background:#eaf4fc;color:#2980b9}

.feedback{padding:16px;border-radius:8px;margin-top:12px;font-size:14px;line-height:1.6}

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">

      <button class="btn btn-primary btn-sm" onclick="saveQuestion()">保存</button>
    </div>
  </div>
</div>

let practiceAnswers = { selected: -1, selectedMulti: [], userText: '', result: false };

function resetPractice() { practiceQuestions = []; practiceIdx = 0; practiceAnswered = false; practiceAnswers = { selected: -1, selectedMulti: [], userText: '', result: false }; render(); }

// ---- 模拟考试 ----
function renderExam() {

function renderExamSetup() {

function startExam() {
  let t = parseInt($('#examTime').value) || 30;
  let typeCounts = {};
  for (let type of ['single', 'multi', 'judge', 'fill', 'essay']) {
    let v = parseInt($('#examType_' + type)?.value) || 0;
    if (v > 0) typeCounts[type] = v;
  }
  if (Object.keys(typeCounts).length === 0) { alert('请至少选择一种题型并设置数量'); return; }
  examSetting = { types: typeCounts, time: t };

  let bank = getBank();
  let byType = {};
  for (let q of bank) {
    if (!byType[q.type]) byType[q.type] = [];
    byType[q.type].push(q);
  }

  let questions = [];
  for (let [type, cnt] of Object.entries(typeCounts)) {
    let pool = byType[type] || [];
    if (pool.length < cnt) cnt = pool.length;
    questions.push(...shuffle(pool).slice(0, cnt));
  }
  examQuestions = shuffle(questions);
  examAnswers = {}; examIdx = 0; examStartTime = Date.now();
  let totalSec = t * 60;
  examTimerInterval = setInterval(() => { let elapsed = Math.floor((Date.now() - examStartTime) / 1000); let left = totalSec - elapsed; if (left <= 0) { submitExam(); return; } let el = $('#examTimer'); if (el) { el.textContent = fmtDuration(left * 1000); if (left < 300) el.classList.add('warning'); } }, 1000);
  render();
}
function renderExamAnswering() {
  let q = examQuestions[examIdx]; let ans = examAnswers[examIdx];
  let totalSec = examSetting.time * 60; let elapsed = Math.floor((Date.now() - examStartTime) / 1000); let left = Math.max(0, totalSec - elapsed);
  let answeredCount = Object.keys(examAnswers).length;
  let html = `<div class="exam-header">
    <span>第 ${examIdx + 1} / ${examQuestions.length} 题</span>
    <span id="examTimer" class="exam-timer${left < 300 ? ' warning' : ''}">${fmtDuration(left * 1000)}</span>
    <span>已答 ${answeredCount} 题</span>
  </div>
  <div class="grid">${examQuestions.map((eq, i) => `<div class="grid-item${i === examIdx ? ' current' : ''}${examAnswers[i] !== undefined ? ' answered' : ''}" onclick="examIdx=${i};render()">${i + 1}</div>`).join('')}</div>
  <div class="card">
    <div class="q-meta"><span class="type-badge ${typeClass(q.type)}">${typeName(q.type)}</span> | ${q.chapter || ''}</div>
    <div class="q-title">${examIdx + 1}. ${q.stem}</div>`;

  if (q.type === 'single' || q.type === 'judge') {
    html += `<div class="options">`;
    q.options.forEach((opt, i) => {
      let sel = ans !== undefined ? ans.selected : -1;
      html += `<div class="opt${sel === i ? ' selected' : ''}" onclick="examAnswers[${examIdx}]={selected:${i}};render()">${q.type === 'single' ? 'ABCD'[i] + '. ' : ''}${opt}</div>`;
    });
    html += `</div>`;
  } else if (q.type === 'multi') {
    let sel = ans !== undefined && ans.selectedMulti ? ans.selectedMulti : [];
    html += `<div class="options"><p style="font-size:13px;color:#888;margin-bottom:8px">多选题，选择一个或多个选项</p>`;
    q.options.forEach((opt, i) => {
      html += `<div class="opt${sel.includes(i) ? ' selected' : ''}" onclick="toggleExamMulti(${examIdx},${i})">${'ABCD'[i]}. ${opt}</div>`;
    });
    html += `</div>`;
  } else if (q.type === 'fill' || q.type === 'essay') {
    html += `<textarea class="fill-input" id="examText" oninput="examAnswers[${examIdx}]={selected:-1,text:this.value}">${ans?.text || ''}</textarea>`;
  }

  html += `</div>
  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-outline" ${examIdx === 0 ? 'disabled' : ''} onclick="examIdx--;render()">上一题</button>
    <button class="btn btn-outline" ${examIdx >= examQuestions.length - 1 ? 'disabled' : ''} onclick="examIdx++;render()">下一题</button>
    <button class="btn btn-primary" onclick="submitExam()">交卷</button>
  </div>`;
  $('#app').innerHTML = html;
  let ta = $('#examText'); if (ta) { ta.scrollIntoView({ behavior: 'smooth' }); }
}
function toggleExamMulti(qIdx, optIdx) {
  if (!examAnswers[qIdx]) examAnswers[qIdx] = { selectedMulti: [] };
  if (!examAnswers[qIdx].selectedMulti) examAnswers[qIdx].selectedMulti = [];
  let idx = examAnswers[qIdx].selectedMulti.indexOf(optIdx);
  if (idx >= 0) examAnswers[qIdx].selectedMulti.splice(idx, 1); else examAnswers[qIdx].selectedMulti.push(optIdx);
  render();
}
function submitExam() {
  if (examTimerInterval) { clearInterval(examTimerInterval); examTimerInterval = null; }
  let total = examQuestions.length; let correct = 0; let details = [];
  examQuestions.forEach((q, i) => {
    let ans = examAnswers[i];
    if (q.type === 'single' || q.type === 'judge') {
      if (ans !== undefined && ans.selected === q.answer) { correct++; details.push({ correct: true }); }
      else { addWrong(q.id); details.push({ correct: false }); }
    } else if (q.type === 'multi') {
      let userMulti = ans?.selectedMulti || [];
      let correctMulti = Array.isArray(q.answer) ? q.answer : [q.answer];
      if (arrEqual(userMulti, correctMulti)) { correct++; details.push({ correct: true, multi: userMulti }); }
      else { addWrong(q.id); details.push({ correct: false, multi: userMulti }); }
    } else {
      let txt = ans?.text || '';
      let score = matchFill(txt, q.answer);
      let ok = q.type === 'fill' ? score >= 0.7 : score >= 0.4;
      if (ok) correct++; else addWrong(q.id);
      details.push({ correct: ok, text: txt });
    }
  });
  let duration = Date.now() - examStartTime;
  let score = total > 0 ? Math.round(correct / total * 100) : 0;
  addHistory({ time: Date.now(), score, total, correct, duration, typeCounts: examQuestions.reduce((acc, q) => { acc[q.type] = (acc[q.type] || 0) + 1; return acc; }, {}) });
  examIdx = examQuestions.length;
  examAnswers = { __score: score, __total: total, __correct: correct, __duration: duration, __details: details };
  render();
}

    else if (q.type === 'multi') {

    } else html += `<br>你的答案：${escHtml(d.text || '(空)')}<br>参考答案：${q.answer}`;
    if (q.analysis) html += `<br>&#x1F4D6; 解析：${q.analysis}`;

  html += `<button class="btn btn-outline" onclick="examQuestions=[];examAnswers={};render()">返回</button></div>`;

function reviewHistory(i) {

function saveQuestion() {
  let t = $('#qType').value; let ch = $('#qChapter').value.trim(); let stem = $('#qStem').value.trim(); let analysis = $('#qAnalysis').value.trim();
  if (!stem) { alert('请输入题干'); return; }

    q.options = opts;
    if (t === 'multi') {
      let correctIndices = []; lines.forEach((s, idx) => { if (s.startsWith('*')) { let realIdx = lines.filter((_, j) => j < idx).map(l => l.replace(/^\*\s*/, '').trim()).filter(Boolean).length; correctIndices.push(realIdx); } });
      q.answer = correctIndices;
    } else {
      let ansIdx = lines.findIndex(s => s.startsWith('*'));
      let realIdx = 0; for (let j = 0; j <= ansIdx; j++) { let stripped = lines[j].replace(/^\*\s*/, '').trim(); if (stripped) { if (j === ansIdx) break; realIdx++; } }
      q.answer = realIdx >= 0 ? realIdx : 0;
    }
  } else { let a = $('#qAnswer').value.trim(); if (!a) { alert('请输入参考答案'); return; } q.answer = a; }
  let bank = getBank();
  if (editId !== null) bank[editId] = q; else bank.push(q);
  saveBank(bank); closeModal(); render();
}
function delQuestion(i) { if (!confirm('确认删除？')) return; let bank = getBank(); removeWrong(bank[i].id); bank.splice(i, 1); saveBank(bank); render(); }

// ---- 导入导出 ----
function exportBank() { let blob = new Blob([JSON.stringify(getBank(), null, 2)], { type: 'application/json' }); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'exam_bank_backup.json'; a.click(); }
function downloadTemplate() {
  let template = [
    { "id": 1, "type": "single", "chapter": "示例章节", "stem": "单选题示例题目？", "options": ["正确选项", "错误选项A", "错误选项B", "错误选项C"], "answer": 0, "analysis": "答案解析（选填）" },
    { "id": 2, "type": "multi", "chapter": "示例章节", "stem": "多选题示例题目？", "options": ["正确选项A", "正确选项B", "错误选项C", "错误选项D"], "answer": [0, 1], "analysis": "answer 为数组，表示第0和第1项正确" },
    { "id": 3, "type": "judge", "chapter": "示例章节", "stem": "判断题示例题目。", "options": ["正确", "错误"], "answer": 0, "analysis": "0=正确, 1=错误" },
    { "id": 4, "type": "fill", "chapter": "示例章节", "stem": "填空题示例：中华人民共和国的首都是______。", "options": [], "answer": "北京", "analysis": "关键词模糊匹配判分" },
    { "id": 5, "type": "essay", "chapter": "示例章节", "stem": "简答题示例：简述科学发展观的内涵。", "options": [], "answer": "第一要义是发展，核心是以人为本，基本要求是全面协调可持续，根本方法是统筹兼顾。", "analysis": "问答题按关键词命中率判分" }
  ];
  let blob = new Blob([JSON.stringify(template, null, 2)], { type: 'application/json' }); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'exam_bank_template.json'; a.click();
}
function importBank(e) {
  let f = e.target.files[0]; if (!f) return;
  let name = f.name.toLowerCase();
  // Excel import
  if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
    let reader = new FileReader();
    reader.onload = function() {
      try {
        let wb = XLSX.read(reader.result, {type: 'array'});
        let ws = wb.Sheets[wb.SheetNames[wb.SheetNames.length - 1]];
        if (!ws) { alert('未找到有效工作表'); return; }
        let rows = XLSX.utils.sheet_to_json(ws, {header: 1})
          .filter(r => r[0] != null && r[0] !== 'ID' && r[0] !== '' && r[1] != null);
        let bank = [];
        rows.forEach(r => {
          let type = String(r[1] || '').trim().toLowerCase();
          if (!['single','multi','judge','fill','essay'].includes(type)) return;
          let stem = String(r[3] || '').trim();
          if (!stem) return;
          let opts = String(r[4] || '').split('\n').map(s => s.trim()).filter(Boolean);
          let ansStr = String(r[5] || '').trim();
          let answer;
          if (type === 'single' || type === 'judge') {
            let n = parseInt(ansStr);
            answer = !isNaN(n) ? Math.max(0, n - 1) : 0;
          } else if (type === 'multi') {
            answer = ansStr.split(/[,，]/).map(s => Math.max(0, parseInt(s.trim()) - 1)).filter(n => !isNaN(n) && n >= 0);
          } else {
            answer = ansStr;
          }
          let q = {
            id: Date.now() % 1000000 + Math.floor(Math.random() * 100000),
            type: type,
            chapter: String(r[2] || '').trim(),
            stem: stem,
            options: opts,
            answer: answer,
            analysis: String(r[6] || '').trim()
          };
          bank.push(q);
        });
        if (!bank.length) { alert('未解析到有效题目，请检查格式（题型代号和题干必填）'); return; }
        saveBank(bank);
        alert('Excel导入成功！共 ' + bank.length + ' 题');
        render();
      } catch(e) { alert('Excel解析失败: ' + e.message); }
    };
    reader.readAsArrayBuffer(f);
    e.target.value = '';
    return;
  }
  // JSON import
  let reader = new FileReader();
  reader.onload = function() {
    try {
      let d = JSON.parse(reader.result);
      if (!Array.isArray(d)) throw new Error();
      saveBank(d);
      alert('JSON导入成功！共 ' + d.length + ' 题');
      render();
    } catch { alert('JSON 格式错误，请检查文件'); }
  };
  reader.readAsText(f);
  e.target.value = '';
}
function doImport() { let t = $('#importArea').value.trim(); try { let d = JSON.parse(t); if (!Array.isArray(d)) throw new Error(); saveBank(d); alert('导入成功！共 ' + d.length + ' 题'); $('#importArea').value = ''; $('#importArea').classList.add('hidden'); $('#importActions').classList.add('hidden'); render(); } catch { alert('JSON 格式错误，请检查'); } }

    { id: 2, type: 'multi', chapter: '示例章节', stem: '多选题示例题目？', options: ['正确选项A', '正确选项B', '错误选项C', '错误选项D'], answer: [0, 1], analysis: 'answer为数组' },
    { id: 3, type: 'judge', chapter: '示例章节', stem: '判断题示例题目。', options: ['正确', '错误'], answer: 0 },
